# CodePrism Configuration Sample

# Optional: Override DB URL
database_url: "sqlite:codeprism.db"
# Or using an absolute path if needed:
# database_url: "sqlite:E:/path/to/codeprism.db"

projects:
  - name: "code-prism"
    global_excludes:
      # 1. 排除根目录下的所有文件
      - "*"
      
      # 2. 排除常见的构建和临时目录
      - "**/.git/**"
      - "**/node_modules/**"
      - "**/target/**"

    # Define custom regex analyzers here (Name -> Pattern)
    custom_regex_analyzers:
      log_info_finder: 
        pattern: "\\b(?:(?:info|print(?:ln)?)!|print(?:ln)?\\b|console\\.(?:log|info)\\b|(?:\\w*[Ll]og(?:ger|ging)?)\\.info\\b)"
        metric_key: "log_info"
        category: "logging"
      log_warn_finder: 
        pattern: "\\b(?:warn!|console\\.warn\\b|(?:\\w*[Ll]og(?:ger|ging)?)\\.(?:warn|warning)\\b)"
        metric_key: "log_warn"
        category: "logging"
      log_error_finder: 
        pattern: "\\b(?:(?:error|eprint(?:ln)?)!|eprint(?:ln)?\\b|console\\.error\\b|(?:\\w*[Ll]og(?:ger|ging)?)\\.(?:error|fatal|exception)\\b)"
        metric_key: "log_error"
        category: "logging"
      log_trace_finder: 
        pattern: "\\b(?:trace!|console\\.trace\\b|(?:\\w*[Ll]og(?:ger|ging)?)\\.trace\\b)"
        metric_key: "log_trace"
        category: "logging"
      log_debug_finder: 
        pattern: "\\b(?:debug!|console\\.debug\\b|(?:\\w*[Ll]og(?:ger|ging)?)\\.debug\\b)"
        metric_key: "log_debug"
        category: "logging"

    custom_impl_analyzers:
      java_complexity:
        metric_key: "complexity"
        category: "maintainability"

    tech_stacks:
      - name: "Rust"
        extensions: ["rs", "toml"]
        analyzers: ["char_count", "log_info_finder", "log_warn_finder", "log_error_finder", "log_trace_finder", "log_debug_finder"]

      - name: "Web"
        extensions: ["js", "ts", "jsx", "tsx", "html", "css"]
        analyzers: ["char_count", "log_info_finder", "log_warn_finder", "log_error_finder", "log_trace_finder", "log_debug_finder"]

      - name: "Python"
        extensions: ["py"]
        analyzers: ["char_count", "log_info_finder", "log_warn_finder", "log_error_finder", "log_trace_finder", "log_debug_finder"]

    aggregation_views:
      sum_file_count_by_tech_stack_pie:
        title: "Total File Count"
        # change_type_mode: "all"
        func:
          type: "sum"
          analyzer_id: "file_count"
          category: "size"
        group_by: ["tech_stack"]
        include_children: false
        chart_type: "pie"

      top_file_size:
        title: "Top 10 File Size"
        tech_stacks: ["All","Rust", "Python", "Web"]
        change_type_mode: "switchable"  # Enable A/M/D toggle buttons
        func:
          type: "top_n"
          analyzer_id: "char_count"
          limit: 10
          order: "desc"

      sum_file_count_by_tech_stack_table:
        title: "Total File Count by Tech Stack"
        change_type_mode: "switchable"
        func:
          type: "sum"
          analyzer_id: "file_count"
          category: "size"
        group_by: ["tech_stack"]
        include_children: false
        chart_type: "table" # table, bar_row, bar_col, pie, line, stacked_bar, heatmap, radar, gauge

      sum_char_count:
        title: "Total Char Count"
        tech_stacks: ["Rust"]
        func:
          type: "sum"
          analyzer_id: "char_count"
        chart_type: "gauge"

      avg_file_size:
        title: "Average File Size"
        func:
          type: "avg"
          analyzer_id: "char_count"
        group_by: ["tech_stack"]
        chart_type: "bar_col"

      file_size_distribution:
        title: "File Size Distribution"
        func:
          type: "distribution"
          analyzer_id: "char_count"
          buckets: [1000, 3000, 5000, 10000, 50000]
        chart_type: "bar_col"

      log_stat_count:
        title: "Log Stat Count"
        tech_stacks: ["Rust", "Python", "Web"]
        func:
          type: "sum"
          category: "logging"
        group_by: ["metric_key"]
        chart_type: "table"
      
      top_complexity:
        title: "Top 10 Complexity"
        tech_stacks: ["Rust", "Python", "Web"]
        func:
          type: "top_n"
          metric_key: "complexity"
          category: "maintainability"
          limit: 10
          order: "desc"

      # === New Chart Types Demo ===

      complexity_radar:
        title: "Complexity Overview (Radar)"
        tech_stacks: ["Rust", "Python", "Web"]
        func:
          type: "top_n"
          metric_key: "complexity"
          limit: 6
        chart_type: "radar"