# CodePrism Configuration Sample

# Optional: Override DB URL
database_url: "sqlite:.codeprism.db"
# Or using an absolute path if needed:
# database_url: "sqlite:E:/path/to/.codeprism.db"

global_excludes:
  # 1. 排除根目录下的所有文件
  - "*"
  
  # 2. 排除常见的构建和临时目录
  - "**/.git/**"
  - "**/node_modules/**"
  - "**/target/**"

# Define custom regex analyzers here (Name -> Pattern)
custom_regex_analyzers:
  log_info_finder: 
    pattern: "\\b[\\w]*(?:[Ll]og|[Ll]ogger)\\.(info)\\b"
    metric_key: "log_info"
    category: "logging"
  log_warn_finder: 
    pattern: "\\b[\\w]*(?:[Ll]og|[Ll]ogger)\\.(warn)\\b"
    metric_key: "log_warn"
    category: "logging"
  log_error_finder: 
    pattern: "\\b[\\w]*(?:[Ll]og|[Ll]ogger)\\.(error|fatal)\\b"
    metric_key: "log_error"
    category: "logging"
  log_trace_finder: 
    pattern: "\\b[\\w]*(?:[Ll]og|[Ll]ogger)\\.(trace)\\b"
    metric_key: "log_trace"
    category: "logging"
  log_debug_finder: 
    pattern: "\\b[\\w]*(?:[Ll]og|[Ll]ogger)\\.(debug)\\b"
    metric_key: "log_debug"
    category: "logging"

custom_impl_analyzers:
  java_complexity:
    metric_key: "complexity"
    category: "maintainability"

tech_stacks:
  - name: "Rust"
    extensions: ["rs", "toml"]
    analyzers: ["char_count"]

  - name: "Web"
    extensions: ["js", "ts", "jsx", "tsx", "html", "css"]
    analyzers: ["char_count"]

  - name: "Java"
    extensions: ["java", "jsp", "xml"]
    analyzers: ["char_count"]

aggregation_views:
  top_file_size:
    title: "Top 10 File Size"
    tech_stacks: ["Rust"]
    func:
      type: "top_n"
      metric_key: "char_count"
      limit: 10
      order: "desc"

  top_complexity:
    title: "Top 10 Complexity"
    tech_stacks: ["Rust", "Java"]
    func:
      type: "top_n"
      metric_key: "complexity"
      category: "maintainability"
      limit: 10
      order: "desc"

  sum_file_count_by_tech_stack_pie:
    title: "Total File Count"
    func:
      type: "sum"
      metric_key: "file_count"
      category: "size"
    group_by: ["tech_stack"]
    include_children: false
    chart_type: "pie"

  sum_file_count_by_tech_stack_table:
    title: "Total File Count by Tech Stack"
    func:
      type: "sum"
      metric_key: "file_count"
      category: "size"
    group_by: ["tech_stack"]
    include_children: false
    chart_type: "table" # table, bar_row, bar_col, pie, line

  sum_char_count:
    title: "Total Char Count in Table"
    tech_stacks: ["Rust"]
    func:
      type: "sum"
      metric_key: "char_count"
      category: "size"
    include_children: false